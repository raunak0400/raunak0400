name: GitHub Trophy Generator

on:
  schedule:
    - cron: "0 0 * * 0"  # Runs every Sunday at midnight UTC
  workflow_dispatch:       # Can be triggered manually

jobs:
  generate-trophy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Generate Trophy SVG
        uses: soulteary/github-profile-trophy-action@v1
        with:
          github-user: guilyx
          theme: onedark
          column: -1
          no-frame: true
          output-path: trophy.svg

      - name: Show generated files (debug)
        run: find . -name "*.svg" ! -path "./.git/*" | head -20

      - name: Commit & Push Trophy SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "chore: update trophy SVG"
          git push
